<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HelloKP — Deal Verification</title>
    <meta name="robots" content="noindex,nofollow" />
    <style>
      :root {
        --bg: #0b0f14;
        --card: #111826;
        --text: #e8eef7;
        --muted: #a9b4c5;
        --green: #22c55e;
        --green-2: #4ade80;
        --red: #ef4444;
        --amber: #f59e0b;
        --blue: #60a5fa;
        --border: rgba(255, 255, 255, 0.08);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
        background:
          radial-gradient(1200px 700px at 20% 0%, rgba(96,165,250,0.12), transparent 60%),
          radial-gradient(1000px 700px at 100% 20%, rgba(34,197,94,0.10), transparent 60%),
          var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .wrap {
        width: 100%;
        max-width: 760px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 14px;
      }

      .logo {
        width: 44px;
        height: 44px;
        border-radius: 14px;
        background: linear-gradient(135deg, rgba(96,165,250,0.35), rgba(34,197,94,0.25));
        border: 1px solid var(--border);
        box-shadow: 0 10px 30px rgba(0,0,0,0.18);
      }

      h1 {
        font-size: 20px;
        margin: 0;
        letter-spacing: 0.2px;
      }

      .sub {
        margin: 2px 0 0;
        color: var(--muted);
        font-size: 13px;
      }

      .card {
        background: rgba(17,24,38,0.78);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 20px 20px 32px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.35);
        backdrop-filter: blur(12px);
      }

      .statusBox {
        border-radius: 22px;
        border: 1px solid var(--border);
        padding: 20px;
        margin-top: 8px;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 14px;
      }

      .statusTop {
        display: flex;
        align-items: center;
        gap: 14px;
        width: 100%;
      }

      .badge {
        width: 58px;
        height: 58px;
        border-radius: 20px;
        display: grid;
        place-items: center;
        font-size: 28px;
        border: 1px solid var(--border);
        flex-shrink: 0;
      }

      .big {
        font-size: 26px;
        font-weight: 900;
        margin: 0;
        letter-spacing: 0.3px;
        line-height: 1.05;
      }

      .msg {
        margin: 5px 0 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.45;
      }

      .actionSection {
        display: none;
        margin-top: 18px;
        padding: 16px;
        border-radius: 18px;
        background: rgba(255,255,255,0.04);
        border: 1px solid var(--border);
      }

      .actionLabel {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 10px;
        letter-spacing: 0.3px;
      }

      .pinWrap {
        display: none;
        width: 100%;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }

      .pinInput {
        flex: 1 1 220px;
        border: 1px solid var(--border);
        background: rgba(255,255,255,0.03);
        color: var(--text);
        border-radius: 16px;
        padding: 14px 16px;
        font-size: 20px;
        font-weight: 800;
        letter-spacing: 6px;
        text-align: center;
        outline: none;
      }

      .pinInput::placeholder {
        letter-spacing: 1px;
        font-size: 14px;
        font-weight: 600;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-top: 16px;
        opacity: 0.55;
      }

      .kv {
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 12px;
        background: rgba(255,255,255,0.02);
      }

      .k {
        color: var(--muted);
        font-size: 11px;
        margin-bottom: 6px;
      }

      .v {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        font-size: 11px;
        word-break: break-all;
      }

      .actions {
        margin-top: 14px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }

      button {
        cursor: pointer;
        border: 1px solid var(--border);
        background: rgba(255,255,255,0.04);
        color: var(--text);
        border-radius: 14px;
        padding: 10px 14px;
        font-size: 14px;
        font-weight: 700;
        transition: background 0.18s ease, opacity 0.18s ease, transform 0.18s ease;
      }

      button:hover {
        background: rgba(255,255,255,0.08);
      }

      .btnPrimary {
        width: 100%;
        background: rgba(34,197,94,0.16);
        border: 1px solid rgba(34,197,94,0.35);
        padding: 14px 16px;
        font-size: 16px;
        font-weight: 900;
        letter-spacing: 0.25px;
      }

      .btnPrimary:hover {
        background: rgba(34,197,94,0.24);
      }

      .btnPrimary:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .foot {
        margin-top: 14px;
        color: var(--muted);
        font-size: 12px;
      }

      .pill {
        display: inline-block;
        border: 1px solid var(--border);
        padding: 5px 10px;
        border-radius: 999px;
        background: rgba(255,255,255,0.03);
      }

      .ok {
        background: rgba(34,197,94,0.10);
      }
      .ok .badge {
        background: rgba(34,197,94,0.18);
      }
      .ok .big {
        color: var(--green);
      }

      .verified {
        background: rgba(34,197,94,0.16);
      }
      .verified .badge {
        background: rgba(34,197,94,0.24);
      }
      .verified .big {
        color: var(--green-2);
      }

      .expired {
        background: rgba(245,158,11,0.12);
      }
      .expired .badge {
        background: rgba(245,158,11,0.18);
      }
      .expired .big {
        color: var(--amber);
      }

      .bad {
        background: rgba(239,68,68,0.10);
      }
      .bad .badge {
        background: rgba(239,68,68,0.18);
      }
      .bad .big {
        color: var(--red);
      }

      .loading {
        background: rgba(96,165,250,0.10);
      }
      .loading .badge {
        background: rgba(96,165,250,0.18);
      }
      .loading .big {
        color: var(--blue);
      }

      @media (max-width: 640px) {
        .row {
          grid-template-columns: 1fr;
        }

        .pinWrap {
          flex-direction: column;
          align-items: stretch;
        }

        .pinInput {
          width: 100%;
        }
      }
    </style>
  </head>

  <body>
    <div class="wrap">
      <div class="brand">
        <div class="logo" aria-hidden="true"></div>
        <div>
          <h1>HelloKP — Deal Verification</h1>
          <p class="sub">Staff view · Secure redemption approval</p>
        </div>
      </div>

      <div class="card">
        <div id="statusBox" class="statusBox loading">
          <div class="statusTop">
            <div id="badge" class="badge">⏳</div>
            <div>
              <p id="big" class="big">Checking…</p>
              <p id="msg" class="msg">Please wait while we validate this QR token.</p>
            </div>
          </div>
        </div>

        <div id="actionSection" class="actionSection">
          <div class="actionLabel">Secure verification required</div>

          <div id="pinWrap" class="pinWrap">
            <input
              id="pinInput"
              class="pinInput"
              type="password"
              inputmode="numeric"
              autocomplete="one-time-code"
              placeholder="Enter staff PIN"
              maxlength="8"
            />
            <button id="redeemBtn" class="btnPrimary" type="button">
              APPROVE REDEMPTION
            </button>
          </div>
        </div>

        <div class="row">
          <div class="kv">
            <div class="k">Token</div>
            <div class="v" id="tokenView">—</div>
          </div>
          <div class="kv">
            <div class="k">Expires at</div>
            <div class="v" id="expiresView">—</div>
          </div>
          <div class="kv">
            <div class="k">Redemption ID</div>
            <div class="v" id="redemptionView">—</div>
          </div>
          <div class="kv">
            <div class="k">Deal ID</div>
            <div class="v" id="dealView">—</div>
          </div>
        </div>

        <div class="actions">
          <button id="refreshBtn" type="button">Refresh</button>
          <button id="copyBtn" type="button">Copy token</button>
        </div>

        <div class="foot">
          <span class="pill">Verified by HelloKP</span>
        </div>
      </div>
    </div>

    <script>
      const EDGE_VERIFY_URL =
        "https://xtoczgaklmkbvnwoyvqm.supabase.co/functions/v1/deal_verify";

      const el = (id) => document.getElementById(id);

      const statusBox = el("statusBox");
      const badge = el("badge");
      const big = el("big");
      const msg = el("msg");

      const tokenView = el("tokenView");
      const expiresView = el("expiresView");
      const redemptionView = el("redemptionView");
      const dealView = el("dealView");

      const refreshBtn = el("refreshBtn");
      const copyBtn = el("copyBtn");

      const actionSection = el("actionSection");
      const pinWrap = el("pinWrap");
      const pinInput = el("pinInput");
      const redeemBtn = el("redeemBtn");

      function setState(state, emoji, title, message) {
        statusBox.className = "statusBox " + state;
        badge.textContent = emoji;
        big.textContent = title;
        msg.textContent = message;
      }

      function fmt(ts) {
        if (!ts) return "—";
        try {
          const d = new Date(ts);
          return d.toLocaleString();
        } catch {
          return String(ts);
        }
      }

      function clearDetails() {
        expiresView.textContent = "—";
        redemptionView.textContent = "—";
        dealView.textContent = "—";
      }

      function getTokenFromUrl() {
        const url = new URL(window.location.href);
        return (url.searchParams.get("t") || "").trim();
      }

      function showPinUI(show) {
        actionSection.style.display = show ? "block" : "none";
        pinWrap.style.display = show ? "flex" : "none";
        redeemBtn.disabled = false;
        redeemBtn.textContent = "APPROVE REDEMPTION";
        if (!show) pinInput.value = "";
      }

      async function redeemWithPin(token) {
        const pin = (pinInput.value || "").trim();

        if (!pin) {
          setState(
            "bad",
            "⚠️",
            "PIN REQUIRED",
            "Enter staff PIN to continue approval."
          );
          pinInput.focus();
          return;
        }

        redeemBtn.disabled = true;
        redeemBtn.textContent = "CONFIRMING…";

        try {
          const res = await fetch(EDGE_VERIFY_URL, {
            method: "POST",
            cache: "no-store",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ t: token, action: "redeem_with_pin", pin }),
          });

          const body = await res.json().catch(() => null);

          if (!body) {
            setState(
              "bad",
              "⚠️",
              "SERVER ERROR",
              "Could not read server response."
            );
            showPinUI(false);
            return;
          }

          renderFromResponse(res, body, token, true);
        } catch (e) {
          setState(
            "bad",
            "⚠️",
            "NETWORK ERROR",
            "Unable to reach verification server."
          );
          showPinUI(false);
        }
      }

      function renderFromResponse(res, body, token, fromPost = false) {
        const data = body.data || {};
        const state = data.state ? String(data.state) : "";

        expiresView.textContent = fmt(data.verify_expires_at);
        redemptionView.textContent = data.redemption_id || "—";
        dealView.textContent = data.deal_id || "—";

        if (res.status === 400 && body.message === "Invalid verification token") {
          setState("bad", "❌", "INVALID QR", "This token format is invalid.");
          showPinUI(false);
          return;
        }

        if (res.status === 404 && body.message === "Token not found") {
          setState("bad", "❌", "NOT FOUND", "This token does not exist in the system.");
          showPinUI(false);
          return;
        }

        if (state === "invalid_pin") {
          setState("bad", "🔒", "WRONG PIN", "Incorrect PIN. Please try again.");
          showPinUI(true);
          pinInput.focus();
          return;
        }

        if (state === "verified") {
          setState(
            "verified",
            "✅",
            "VERIFIED",
            data.verified_at
              ? "Redemption approved successfully at " + fmt(data.verified_at) + ". This deal is now marked as used."
              : "Redemption approved successfully. This deal is now marked as used."
          );
          showPinUI(false);
          return;
        }

        if (fromPost && state === "redeemed") {
          setState(
            "verified",
            "✅",
            "VERIFIED",
            data.redeemed_at
              ? "Redemption approved successfully at " + fmt(data.redeemed_at) + ". This deal is now marked as used."
              : "Redemption approved successfully. This deal is now marked as used."
          );
          showPinUI(false);
          return;
        }

        if (state === "redeemed") {
          setState(
            "expired",
            "⏱️",
            "ALREADY USED",
            data.redeemed_at
              ? "This deal was already redeemed at " + fmt(data.redeemed_at) + ". Do not accept it again."
              : "This deal was already used. Do not accept it again."
          );
          showPinUI(false);
          return;
        }

        if (state === "expired") {
          setState(
            "expired",
            "⏱️",
            "QR EXPIRED",
            "This QR has expired. Ask the customer to generate a fresh one."
          );
          showPinUI(false);
          return;
        }

        if (state === "valid") {
          setState(
            "ok",
            "✅",
            "READY TO APPROVE",
            "Verify the customer and enter your staff PIN to approve."
          );
          showPinUI(true);
          redeemBtn.onclick = () => redeemWithPin(token);
          pinInput.focus();
          return;
        }

        setState(
          "bad",
          "⚠️",
          "UNEXPECTED RESPONSE",
          body.message || "Unknown validation response."
        );
        showPinUI(false);
      }

      async function verify() {
        const token = getTokenFromUrl();

        tokenView.textContent = token || "—";
        clearDetails();
        showPinUI(false);

        if (!token) {
          setState(
            "bad",
            "❌",
            "MISSING TOKEN",
            "This QR code does not include a verification token."
          );
          return;
        }

        setState("loading", "⏳", "CHECKING…", "Validating this redemption token…");

        try {
          const res = await fetch(
            EDGE_VERIFY_URL + "?t=" + encodeURIComponent(token),
            { method: "GET", cache: "no-store" }
          );

          const body = await res.json().catch(() => null);

          if (!body) {
            setState("bad", "⚠️", "SERVER ERROR", "Could not read server response.");
            return;
          }

          renderFromResponse(res, body, token, false);
        } catch (e) {
          setState("bad", "⚠️", "NETWORK ERROR", "Unable to reach verification server.");
        }
      }

      refreshBtn.addEventListener("click", () => verify());

      copyBtn.addEventListener("click", async () => {
        const token = getTokenFromUrl();
        if (!token) return;

        try {
          await navigator.clipboard.writeText(token);
          copyBtn.textContent = "Copied ✅";
          setTimeout(() => {
            copyBtn.textContent = "Copy token";
          }, 1200);
        } catch {}
      });

      pinInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !redeemBtn.disabled) {
          redeemBtn.click();
        }
      });

      verify();
    </script>
  </body>
</html>
